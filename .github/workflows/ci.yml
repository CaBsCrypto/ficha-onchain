name: ci

# Typecheck and build the Next.js app on every PR — the merge gate.
#
# This exists so merges do not depend on a Vercel deploy. Vercel's build was the
# only check, which meant every push burned a preview deployment, and on the
# Hobby plan's daily cap that turns iteration into an outage: deploys start
# failing with a 0ms build and no message, blocking merges on code that is fine.
# GitHub Actions minutes are effectively unlimited for this, so verification is
# free and Vercel is left to do actual deploys.

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # legacy-peer-deps is set in .npmrc; ci honors it.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # NEXT_PUBLIC_* are inlined at build time. The real values live in Vercel;
      # here they only need to be present and well-formed so the build does not
      # throw (e.g. Privy rejects an empty appId while prerendering). These are
      # public config, not secrets.
      - name: Build
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: cmrix722m03d30clewd1fuffq
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_DOCTOR_REGISTRY_ID: CC246CYKOEAZVKWEJGOXTKW436LYYLR2EHKFD2WFGABXGSFX2UEX2X2O
          NEXT_PUBLIC_PRESCRIPTION_ID: CA3I4NLBELODRXUUBVZDBVAU47W65KPZ6UFWEXCEEDUDQYZQ4E5YLXYL
          NEXT_PUBLIC_PASSKEY_ENABLED: "false"
        run: npm run build
