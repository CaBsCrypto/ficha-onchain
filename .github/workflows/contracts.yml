name: contracts

# Green CI proving the Soroban contract test suite passes, plus the compiled
# WASM as a downloadable artifact.
#
# The build job exists because the contracts cannot be compiled on the maintainer's
# machine: WDAC blocks rustc from loading proc-macro DLLs (os error 4551), and
# soroban-sdk's macro chain makes that unavoidable. Under the release profile the
# failure disguises itself as "can't find crate for serde_with_macros"; the dev
# profile shows the real 4551. So CI is the only place a deployable WASM can be
# produced — download the artifact from a run, then deploy it with the Stellar CLI.

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  # Lets a WASM be built on demand from any branch, without a contract change.
  workflow_dispatch:

jobs:
  test:
    name: cargo test (Soroban contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      # Scoped to the three crates under test so an unfinished contract elsewhere
      # in the workspace cannot redden the badge.
      - name: Run test suite
        run: cargo test --locked -p doctor-registry -p prescription-soulbound -p trustleaf-e2e --verbose

  build:
    name: build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      # Pinned to 1.81, the last release before wasm32 got reference-types and
      # multivalue by default. Soroban's VM rejects both, and `-C target-feature`
      # does not undo them — they are baked into the target spec, so a 1.96 build
      # produces a WASM that deploys with Error(WasmVm, InvalidAction) no matter
      # what flags are passed. Verified: the artifact came back byte-identical
      # with the flags on and off.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.81
        with:
          targets: wasm32-unknown-unknown

      # Deliberately uncached. A warm target/ served a byte-identical WASM back
      # after the rustflags changed, so the fix silently did nothing twice. A
      # cold ~2min build is worth knowing the artifact matches the source.

      # The -reference-types/-multivalue flags Soroban needs live in
      # contracts/.cargo/config.toml, so they apply here and locally alike.
      - name: Build contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release \
            -p doctor-registry -p prescription-soulbound

      # Not optimised through `stellar contract optimize`: these are small enough
      # that the extra tool is not worth the moving part. Revisit if a deploy
      # ever hits a size limit.
      - name: Report sizes
        run: ls -lh target/wasm32-unknown-unknown/release/*.wasm

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30
          if-no-files-found: error
